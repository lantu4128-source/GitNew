<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 每日趋势</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            min-height: 100vh;
            color: #c9d1d9;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header { text-align: center; padding: 30px 0; }

        h1 { font-size: 2.5rem; color: #58a6ff; margin-bottom: 10px; }

        .update-info { color: #8b949e; font-size: 14px; }

        .category-tags {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .category-tag {
            background: #30363d;
            color: #8b949e;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .category-tag:hover { border-color: #58a6ff; color: #58a6ff; }

        .category-tag.active {
            background: #238636;
            color: #fff;
            border-color: #238636;
        }

        .btn-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-top: 30px;
        }

        @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } }

        .section {
            background: #21262d;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #30363d;
        }

        .section-title {
            font-size: 1.3rem;
            color: #f0f6fc;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .repo-list { list-style: none; }

        .repo-item {
            padding: 16px;
            border-bottom: 1px solid #30363d;
            transition: background 0.2s;
        }

        .repo-item:last-child { border-bottom: none; }
        .repo-item:hover { background: #30363d; border-radius: 8px; }

        .repo-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .repo-name { font-size: 1.1rem; font-weight: 600; }
        .repo-name a { color: #58a6ff; text-decoration: none; }
        .repo-name a:hover { text-decoration: underline; }

        .repo-rank {
            background: #388bfd;
            color: #fff;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .repo-desc {
            color: #8b949e;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .repo-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 13px;
        }

        .meta-item { display: flex; align-items: center; gap: 4px; color: #8b949e; }
        .meta-item.stars { color: #f1e05a; }

        .language-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .loading { text-align: center; padding: 40px; color: #8b949e; }

        .spinner {
            border: 3px solid #30363d;
            border-top: 3px solid #58a6ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn {
            background: #238636;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn:hover { background: #2ea043; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .error {
            background: #f8514966;
            border: 1px solid #f85149;
            padding: 16px;
            border-radius: 8px;
            color: #f85149;
            text-align: center;
        }

        .notice {
            background: #1f6feb33;
            border: 1px solid #1f6feb;
            padding: 12px;
            border-radius: 8px;
            color: #58a6ff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
        }

        code {
            background: #30363d;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>GitHub 每日趋势</h1>
            <p class="update-info" id="updateTime">正在加载...</p>

            <div class="category-tags">
                <span class="category-tag active" data-category="ai">🤖 人工智能</span>
                <span class="category-tag" data-category="web">🌐 Web开发</span>
                <span class="category-tag" data-category="mobile">📱 移动开发</span>
                <span class="category-tag" data-category="devops">🔧 DevOps</span>
                <span class="category-tag" data-category="data">📊 数据科学</span>
                <span class="category-tag" data-category="security">🔒 安全</span>
                <span class="category-tag" data-category="game">🎮 游戏</span>
                <span class="category-tag" data-category="all">📦 全部</span>
            </div>

            <div class="btn-group">
                <button class="btn" onclick="loadData()">刷新数据</button>
                <button class="btn" id="translateBtn" onclick="translateAll()">翻译描述</button>
            </div>
        </header>

        <div id="notice" class="notice" style="display:none;"></div>

        <div class="grid">
            <div class="section">
                <h2 class="section-title">
                    <span>⭐</span>
                    <span id="topStarsTitle">最高星标 Top 10</span>
                </h2>
                <ul class="repo-list" id="topStars">
                    <li class="loading"><div class="spinner"></div><p>正在加载...</p></li>
                </ul>
            </div>

            <div class="section">
                <h2 class="section-title">
                    <span>🚀</span>
                    <span id="trendingTitle">近期热门 Top 10</span>
                </h2>
                <ul class="repo-list" id="trending">
                    <li class="loading"><div class="spinner"></div><p>正在加载...</p></li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const langColors = {
            'JavaScript': '#f1e05a', 'TypeScript': '#3178c6', 'Python': '#3572A5',
            'Java': '#b07219', 'Go': '#00ADD8', 'Rust': '#dea584',
            'C++': '#f34b7d', 'C': '#555555', 'Ruby': '#701516',
            'PHP': '#4F5D95', 'Swift': '#F05138', 'Kotlin': '#A97BFF',
            'Vue': '#41b883', 'CSS': '#563d7c', 'HTML': '#e34c26',
            'Shell': '#89e051', 'Jupyter Notebook': '#DA5B0B', 'C#': '#178600',
        };

        const categoryNames = {
            ai: '人工智能', web: 'Web开发', mobile: '移动开发',
            devops: 'DevOps', data: '数据科学', security: '安全',
            game: '游戏', all: '全部'
        };

        let allData = null;
        let currentCategory = 'ai';

        function formatNumber(num) {
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num.toString();
        }

        function renderRepo(repo, rank) {
            const langColor = langColors[repo.language] || '#8b949e';
            return `
                <li class="repo-item">
                    <div class="repo-header">
                        <div class="repo-name">
                            <a href="${repo.url}" target="_blank">${repo.owner}/${repo.name}</a>
                        </div>
                        <span class="repo-rank">#${rank}</span>
                    </div>
                    <p class="repo-desc">${repo.description || '暂无描述'}</p>
                    <div class="repo-meta">
                        <span class="meta-item stars">★ ${formatNumber(repo.stars)}</span>
                        ${repo.language ? `<span class="meta-item"><span class="language-dot" style="background:${langColor}"></span> ${repo.language}</span>` : ''}
                        <span class="meta-item">🍴 ${formatNumber(repo.forks)}</span>
                    </div>
                </li>
            `;
        }

        function renderList(containerId, repos) {
            const container = document.getElementById(containerId);
            if (!repos || repos.length === 0) {
                container.innerHTML = '<li class="loading">暂无数据</li>';
                return;
            }
            container.innerHTML = repos.map((repo, i) => renderRepo(repo, i + 1)).join('');
        }

        function showLoading() {
            const html = '<li class="loading"><div class="spinner"></div><p>正在加载...</p></li>';
            document.getElementById('topStars').innerHTML = html;
            document.getElementById('trending').innerHTML = html;
        }

        function showError(message) {
            const html = `<li class="error">${message}</li>`;
            document.getElementById('topStars').innerHTML = html;
            document.getElementById('trending').innerHTML = html;
        }

        function renderCategory() {
            if (!allData || !allData.categories) return;

            const catData = allData.categories[currentCategory];
            const catName = categoryNames[currentCategory];

            document.getElementById('topStarsTitle').textContent = `${catName} 最高星标 Top 10`;
            document.getElementById('trendingTitle').textContent = `${catName} 近期热门 Top 10`;

            if (catData) {
                renderList('topStars', catData.topStars);
                renderList('trending', catData.trending);
            } else {
                showError('该分类暂无数据');
            }
        }

        async function loadData() {
            showLoading();
            document.getElementById('notice').style.display = 'none';

            try {
                const res = await fetch('data.json?t=' + Date.now());
                if (!res.ok) throw new Error('数据文件不存在');
                allData = await res.json();

                if (!allData.categories) {
                    throw new Error('数据格式错误，请重新运行 node fetch_data.js');
                }

                const time = new Date(allData.timestamp).toLocaleString('zh-CN');
                document.getElementById('updateTime').textContent = `数据更新时间: ${time}`;

                renderCategory();
            } catch (e) {
                showError(e.message);
                document.getElementById('notice').style.display = 'block';
                document.getElementById('notice').innerHTML =
                    '提示: 在终端运行 <code>node fetch_data.js</code> 获取数据，然后刷新页面';
            }
        }

        // 标签点击
        document.querySelectorAll('.category-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                currentCategory = tag.dataset.category;
                document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                renderCategory();
            });
        });

        // 翻译功能
        async function translateText(text) {
            if (!text || /[\u4e00-\u9fa5]/.test(text)) return text;
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text.substring(0, 500))}&langpair=en|zh-CN`);
                const data = await res.json();
                if (data.responseStatus === 200) {
                    return data.responseData.translatedText;
                }
            } catch (e) {}
            return text;
        }

        async function translateAll() {
            const btn = document.getElementById('translateBtn');
            btn.disabled = true;
            btn.textContent = '翻译中...';

            const descElements = document.querySelectorAll('.repo-desc');
            for (const el of descElements) {
                const original = el.textContent;
                if (original && original !== '暂无描述') {
                    el.textContent = await translateText(original);
                }
            }

            btn.textContent = '翻译完成';
            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = '翻译描述';
            }, 2000);
        }

        // 初始化
        loadData();
    </script>
</body>
</html>
